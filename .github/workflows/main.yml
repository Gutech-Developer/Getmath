name: Getsmart Frontend CI

on:
  push:
    branches: ["main", "staging"]
  pull_request:
    branches: ["main", "staging"]

jobs:
  build:
    name: Check pnpm build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

  docker:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID || vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GETSMART_API_URL=${{ secrets.NEXT_PUBLIC_GETSMART_API_URL || vars.NEXT_PUBLIC_GETSMART_API_URL }}

      - name: Trigger Dokploy Redeploy
        if: github.event_name == 'push'
        env:
          DOKPLOY_WEBHOOK: ${{ github.ref == 'refs/heads/main' && (secrets.DOKPLOY_WEBHOOK_URL_PROD || secrets.DOKPLOY_WEBHOOK_URL) || (github.ref == 'refs/heads/staging' && secrets.DOKPLOY_WEBHOOK_URL_STAGING) || '' }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK" ]; then
            echo "Dokploy webhook URL is not configured for branch ${{ github.ref_name }}. Skipping redeploy."
            exit 0
          fi
          echo "Triggering Dokploy Redeploy for branch ${{ github.ref_name }}..."
          curl -s -X POST "$DOKPLOY_WEBHOOK"
